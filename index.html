<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Team btw!</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <style>

    /* ============================================
       RESET
    ============================================ */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* ============================================
       DESIGN TOKENS
       Gold is now a cool, bright yellow-white gold.
       Glow intensity is kept very low so it reads
       as gold, not orange, on dark backgrounds.
    ============================================ */
    :root {
      --bg:         #060608;
      --bg-card:    #0c0c10;
      --bg-alt:     #09090d;
      --gold:       #F5C518;   /* IMDb-style cool gold — reads clearly as gold not orange */
      --gold-hover: #ffe066;   /* lighter on hover */
      --blue:       #00AAFF;
      --white:      #FFFFFF;
      --grey:       #A0A0A8;
      --border:     #16161e;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--white);
      font-family: 'Rajdhani', sans-serif;
      font-size: 16px;
      line-height: 1.6;
      overflow-x: hidden;
    }

    section { padding: 6rem 2rem; }

    /* ============================================
       SECTION TITLES
    ============================================ */
    .section-title {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: clamp(1.5rem, 4vw, 2.4rem);
      color: var(--white);
      text-align: center;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 3rem;
    }

    .section-title::after {
      content: '';
      display: block;
      width: 54px;
      height: 2px;
      background: linear-gradient(90deg, var(--blue), var(--gold));
      margin: 0.7rem auto 0;
      border-radius: 2px;
    }

    /* ============================================
       BUTTONS
    ============================================ */

    /* Primary gold outline button */
    .btn-primary {
      display: inline-block;
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: 0.75rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--gold);
      padding: 0.9rem 2.6rem;
      border: 2px solid var(--gold);
      border-radius: 3px;
      background: transparent;
      cursor: pointer;
      transition: background 0.22s, color 0.22s, border-color 0.22s;
    }

    .btn-primary:hover {
      background: var(--gold);
      color: #000;
      border-color: var(--gold);
    }

    /* Secondary card button */
    .btn-secondary {
      display: inline-block;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700;
      font-size: 0.82rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--grey);
      padding: 0.45rem 1.2rem;
      border: 1px solid #232330;
      border-radius: 3px;
      background: transparent;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }

    .btn-secondary:hover {
      color: var(--gold);
      border-color: var(--gold);
    }

    /* ============================================
       NAV
    ============================================ */
    nav {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.85rem 2.5rem;
      background: rgba(6, 6, 8, 0.94);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
    }

    .nav-logo {
      display: flex;
      align-items: center;
      text-decoration: none;
    }

    .nav-logo-img {
      height: 36px;
      width: auto;
    }

    .nav-logo-text {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: 1.1rem;
      color: var(--gold);
      letter-spacing: 0.1em;
    }

    .nav-links {
      display: flex;
      gap: 2.5rem;
      list-style: none;
    }

    .nav-links a {
      font-family: 'Rajdhani', sans-serif;
      font-weight: 600;
      font-size: 0.85rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--grey);
      text-decoration: none;
      transition: color 0.2s;
    }

    .nav-links a:hover { color: var(--gold); }

    /* ============================================
       HERO
    ============================================ */
    #hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 0 2rem;
      position: relative;
      background:
        radial-gradient(ellipse 55% 40% at 50% 52%, rgba(245, 197, 24, 0.04) 0%, transparent 70%),
        var(--bg);
    }

    #hero::before, #hero::after {
      content: '';
      position: absolute;
      width: 80px;
      height: 80px;
      border-style: solid;
      border-color: var(--gold);
      opacity: 0.15;
    }
    #hero::before { top: 10%; left: 5%; border-width: 2px 0 0 2px; }
    #hero::after  { bottom: 10%; right: 5%; border-width: 0 2px 2px 0; }

    .hero-logo-img {
      width: clamp(160px, 36vw, 420px);
      height: auto;
      margin-bottom: 1.5rem;
    }

    .hero-eyebrow {
      font-family: 'Rajdhani', sans-serif;
      font-weight: 600;
      font-size: 0.75rem;
      letter-spacing: 0.45em;
      text-transform: uppercase;
      color: var(--blue);
      margin-bottom: 0.9rem;
    }

    .hero-title {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: clamp(2.6rem, 9vw, 6.5rem);
      line-height: 1;
      color: var(--white);
      letter-spacing: 0.04em;
      margin-bottom: 0.6rem;
    }

    .hero-title .gold { color: var(--gold); }

    .hero-subtitle {
      font-family: 'Rajdhani', sans-serif;
      font-weight: 500;
      font-size: clamp(0.9rem, 2.2vw, 1.3rem);
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--grey);
      margin-bottom: 3rem;
    }

    /* ============================================
       ROSTER
    ============================================ */
    #roster { background: var(--bg-alt); }

    .roster-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1.75rem;
      max-width: 1100px;
      margin: 0 auto;
    }

    .player-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 2rem 1.5rem 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      text-align: center;
      position: relative;
      overflow: hidden;
      transition: border-color 0.3s, transform 0.3s;
    }

    .player-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .player-card:hover {
      border-color: var(--gold);
      transform: translateY(-5px);
    }

    .player-card:hover::before { opacity: 1; }

    .player-avatar {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      background: #111118;
      border: 2px solid #202030;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: 1.5rem;
      color: var(--gold);
      margin-bottom: 0.5rem;
      overflow: hidden;
      transition: border-color 0.3s;
    }

    .player-avatar--img {
      object-fit: cover;
      font-size: 0;
    }

    .player-card:hover .player-avatar {
      border-color: var(--gold);
    }

    .player-name {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: 1.2rem;
      color: var(--white);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .player-role {
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700;
      font-size: 0.74rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 0.5rem;
    }

    .card-divider {
      width: 34px;
      height: 1px;
      background: #1e1e28;
      margin: 0.25rem 0 1rem;
    }

    .card-buttons {
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    /* ============================================
       FEED
    ============================================ */
    #feed { background: var(--bg); }

    .feed-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1.5rem;
      max-width: 1100px;
      margin: 0 auto;
    }

    .tiktok-card {
      flex: 0 0 auto;
      width: 320px;
      height: 568px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      transition: border-color 0.3s;
    }

    .tiktok-card:hover { border-color: #2a2a38; }

    .tiktok-placeholder-inner {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
    }

    .tiktok-placeholder-inner svg {
      width: 34px;
      height: 34px;
      fill: #1e1e2a;
    }

    .tiktok-placeholder-inner span {
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #1e1e2a;
    }

    /* ============================================
       FOOTER
    ============================================ */
    footer {
      background: #040406;
      border-top: 1px solid var(--border);
      padding: 3.5rem 2rem;
      text-align: center;
    }

    .footer-logo-img {
      height: 42px;
      width: auto;
      display: block;
      margin: 0 auto 1.5rem;
      opacity: 0.9;
    }

    .footer-logo-text {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: 1.3rem;
      color: var(--white);
      letter-spacing: 0.12em;
      margin-bottom: 1.5rem;
      display: block;
    }

    .footer-links {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 0.5rem 2rem;
      margin-bottom: 1.75rem;
    }

    .footer-links a {
      font-family: 'Rajdhani', sans-serif;
      font-weight: 600;
      font-size: 0.86rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--grey);
      text-decoration: none;
      transition: color 0.2s;
    }

    .footer-links a:hover { color: var(--gold); }

    .footer-sep { color: #1e1e28; user-select: none; }

    .footer-copy {
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.74rem;
      letter-spacing: 0.1em;
      color: #282835;
      text-transform: uppercase;
    }

    /* ============================================
       SCAN LINE AMBIENCE
    ============================================ */
    body::after {
      content: '';
      position: fixed;
      top: -2px; left: 0;
      width: 100%;
      height: 1px;
      background: rgba(245, 197, 24, 0.07);
      animation: scan 12s linear infinite;
      pointer-events: none;
      z-index: 9999;
    }

    @keyframes scan {
      0%   { top: -1px; }
      100% { top: 100vh; }
    }

    /* ============================================
       RESPONSIVE
    ============================================ */
    @media (max-width: 768px) {
      .nav-links { display: none; }
      section { padding: 4rem 1.25rem; }
      #hero::before, #hero::after { width: 48px; height: 48px; }
      .roster-grid {
        grid-template-columns: 1fr;
        max-width: 290px;
      }
      .tiktok-card {
        width: 100%;
        max-width: 320px;
        height: 510px;
      }
    }

    @media (max-width: 480px) {
      .hero-title    { font-size: 2.4rem; }
      .hero-subtitle { font-size: 0.86rem; letter-spacing: 0.14em; }
      .hero-logo-img { width: 80vw; }
    }

  </style>
</head>
