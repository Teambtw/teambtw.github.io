<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Team btw!</title>

  <link rel="preconnect" href="[fonts.googleapis.com](https://fonts.googleapis.com)" />
  <link rel="preconnect" href="[fonts.gstatic.com](https://fonts.gstatic.com)" crossorigin />
  <link
    href="[fonts.googleapis.com](https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap)"
    rel="stylesheet"
  />

  <style>
    /* ============================================
       RESET & BASE
    ============================================ */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg:          #060608;
      --bg-card:     #0d0d12;
      --bg-section:  #0a0a0e;

      /* TRUE GOLD — pulled from pure yellow-gold spectrum, not orange */
      --gold:        #FFD700;
      --gold-dim:    #c9a800;
      --gold-glow:   rgba(255, 215, 0, 0.4);
      --gold-soft:   rgba(255, 215, 0, 0.12);

      /* ELECTRIC BLUE */
      --blue:        #00AAFF;
      --blue-glow:   rgba(0, 170, 255, 0.35);

      --white:       #FFFFFF;
      --grey:        #B0B0B0;
      --border-dim:  #18181f;
    }

    html { scroll-behavior: smooth; }

    body {
      background-color: var(--bg);
      color: var(--white);
      font-family: 'Rajdhani', sans-serif;
      font-size: 16px;
      line-height: 1.6;
      overflow-x: hidden;
    }

    section { padding: 6rem 2rem; }

    /* ============================================
       SECTION TITLES
    ============================================ */
    .section-title {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: clamp(1.6rem, 4vw, 2.5rem);
      color: var(--white);
      text-align: center;
      margin-bottom: 3rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      text-shadow:
        0 0 15px rgba(255, 215, 0, 0.3),
        0 0 40px rgba(255, 215, 0, 0.1);
    }

    .section-title::after {
      content: '';
      display: block;
      width: 56px;
      height: 2px;
      background: linear-gradient(90deg, var(--blue), var(--gold));
      margin: 0.75rem auto 0;
      border-radius: 2px;
    }

    /* ============================================
       BUTTONS
    ============================================ */
    .btn-primary {
      display: inline-block;
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: 0.78rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--gold);
      padding: 0.9rem 2.6rem;
      border: 2px solid var(--gold);
      border-radius: 3px;
      background: transparent;
      cursor: pointer;
      transition: background 0.25s, color 0.25s, box-shadow 0.25s;
      box-shadow:
        0 0 14px rgba(255, 215, 0, 0.2),
        inset 0 0 14px rgba(255, 215, 0, 0.04);
    }

    .btn-primary:hover {
      background: var(--gold);
      color: var(--bg);
      box-shadow:
        0 0 28px rgba(255, 215, 0, 0.55),
        0 0 70px rgba(255, 215, 0, 0.2);
    }

    .btn-secondary {
      display: inline-block;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700;
      font-size: 0.82rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--grey);
      padding: 0.45rem 1.2rem;
      border: 1px solid #252530;
      border-radius: 3px;
      background: transparent;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s, box-shadow 0.2s;
    }

    .btn-secondary:hover {
      color: var(--gold);
      border-color: var(--gold);
      box-shadow: 0 0 12px rgba(255, 215, 0, 0.25);
    }

    /* ============================================
       NAVIGATION
    ============================================ */
    nav {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.85rem 2.5rem;
      background: rgba(6, 6, 8, 0.92);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border-dim);
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      text-decoration: none;
    }

    /*
      NAV LOGO IMAGE
      Save your btw! logo file as "btw-logo.png" in the same
      folder as index.html — it loads automatically.
    */
    .nav-logo-img {
      height: 36px;
      width: auto;
      object-fit: contain;
    }

    .nav-logo-fallback {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: 1.05rem;
      color: var(--gold);
      letter-spacing: 0.1em;
      text-shadow: 0 0 12px rgba(255, 215, 0, 0.5);
    }

    .nav-links {
      display: flex;
      gap: 2.5rem;
      list-style: none;
    }

    .nav-links a {
      font-family: 'Rajdhani', sans-serif;
      font-weight: 600;
      font-size: 0.85rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--grey);
      text-decoration: none;
      transition: color 0.2s;
    }

    .nav-links a:hover { color: var(--gold); }

    /* ============================================
       HERO
    ============================================ */
    #hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 0 2rem;
      position: relative;
      background:
        radial-gradient(ellipse 60% 45% at 50% 52%, rgba(255,215,0,0.045) 0%, transparent 65%),
        radial-gradient(ellipse 90% 70% at 50% 50%, rgba(0,170,255,0.025) 0%, transparent 80%),
        var(--bg);
    }

    /* Corner bracket decorations */
    #hero::before, #hero::after {
      content: '';
      position: absolute;
      width: 90px;
      height: 90px;
      border-style: solid;
      border-color: var(--gold);
      opacity: 0.18;
    }
    #hero::before { top: 10%; left: 5%; border-width: 2px 0 0 2px; }
    #hero::after  { bottom: 10%; right: 5%; border-width: 0 2px 2px 0; }

    /*
      HERO LOGO IMAGE
      Save btw-logo.png in the same folder — shows above the title.
      The onerror hides it cleanly if the file isn't there yet.
    */
    .hero-logo-img {
      width: clamp(180px, 38vw, 440px);
      height: auto;
      object-fit: contain;
      margin-bottom: 1.5rem;
      filter: drop-shadow(0 0 35px rgba(255,215,0,0.28));
    }

    .hero-eyebrow {
      font-family: 'Rajdhani', sans-serif;
      font-weight: 600;
      font-size: 0.78rem;
      letter-spacing: 0.45em;
      text-transform: uppercase;
      color: var(--blue);
      margin-bottom: 0.9rem;
      opacity: 0.9;
    }

    .hero-title {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: clamp(2.8rem, 9vw, 7rem);
      line-height: 1;
      color: var(--white);
      letter-spacing: 0.04em;
      text-shadow:
        0 0 25px rgba(255,215,0,0.5),
        0 0 70px rgba(255,215,0,0.18),
        0 0 120px rgba(255,215,0,0.07);
      margin-bottom: 0.6rem;
    }

    /* "btw!" accent word in gold */
    .hero-title .exclaim { color: var(--gold); }

    .hero-subtitle {
      font-family: 'Rajdhani', sans-serif;
      font-weight: 500;
      font-size: clamp(0.95rem, 2.5vw, 1.35rem);
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--grey);
      margin-bottom: 3rem;
    }

    /* ============================================
       ROSTER
       Duplicate .player-card for each new member.
    ============================================ */
    #roster {
      background: linear-gradient(180deg, var(--bg) 0%, var(--bg-section) 100%);
    }

    .roster-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1.75rem;
      max-width: 1100px;
      margin: 0 auto;
    }

    /* ── PLAYER CARD ────────────────────────────
       Copy this entire block to add a new member.
       Update: avatar letter or image, name, role, href links.
    ──────────────────────────────────────────── */
    .player-card {
      background: var(--bg-card);
      border: 1px solid var(--border-dim);
      border-radius: 8px;
      padding: 2rem 1.5rem 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      text-align: center;
      position: relative;
      overflow: hidden;
      transition: border-color 0.3s, box-shadow 0.3s, transform 0.3s;
    }

    /* Gold shimmer top bar — appears on hover */
    .player-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .player-card:hover {
      border-color: var(--gold);
      box-shadow:
        0 0 25px rgba(255,215,0,0.14),
        0 0 60px rgba(255,215,0,0.05);
      transform: translateY(-5px);
    }

    .player-card:hover::before { opacity: 1; }

    /*
      PLAYER AVATAR
      Using the dog photo for JDogg:
        1. Save the dog image as "jdogg-logo.jpg" in the same folder.
        2. Swap the <div class="player-avatar"> below for:
           <img src="jdogg-logo.jpg" alt="JDogg"
                class="player-avatar player-avatar--img" />
    */
    .player-avatar {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: linear-gradient(135deg, #0d0d12 0%, #1a1a24 100%);
      border: 2px solid #222230;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: 1.6rem;
      color: var(--gold);
      margin-bottom: 0.5rem;
      overflow: hidden;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    /* Applied when using a real photo */
    .player-avatar--img {
      object-fit: cover;
    }

    .player-card:hover .player-avatar {
      border-color: var(--gold);
      box-shadow: 0 0 16px rgba(255,215,0,0.3);
    }

    .player-name {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: 1.25rem;
      color: var(--white);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .player-role {
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700;
      font-size: 0.76rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 0.5rem;
    }

    .card-divider {
      width: 36px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #25253a, transparent);
      margin: 0.25rem 0 1rem;
    }

    .card-buttons {
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    /* ── END PLAYER CARD ──────────────────────── */

    /* ============================================
       FEED — Recent Drops
       Replace .tiktok-placeholder-inner with a real
       TikTok <blockquote class="tiktok-embed"> + script.
    ============================================ */
    #feed { background: var(--bg); }

    .feed-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1.5rem;
      max-width: 1100px;
      margin: 0 auto;
    }

    .tiktok-card {
      flex: 0 0 auto;
      width: 320px;
      height: 568px;
      background: var(--bg-card);
      border: 1px solid var(--border-dim);
      border-radius: 10px;
      overflow: hidden;
      position: relative;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    .tiktok-card:hover {
      border-color: rgba(255,215,0,0.2);
      box-shadow: 0 0 25px rgba(255,215,0,0.07);
    }

    .tiktok-placeholder-inner {
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      color: #222230;
    }

    .tiktok-placeholder-inner svg {
      width: 36px; height: 36px;
      fill: #222230;
    }

    .tiktok-placeholder-inner span {
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.74rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    /* ============================================
       FOOTER
    ============================================ */
    footer {
      background: #040406;
      border-top: 1px solid var(--border-dim);
      padding: 3.5rem 2rem;
      text-align: center;
    }

    /*
      FOOTER LOGO IMAGE
      Same btw-logo.png file — smaller size.
    */
    .footer-logo-img {
      height: 44px;
      width: auto;
      object-fit: contain;
      display: block;
      margin: 0 auto 1.5rem;
      opacity: 0.85;
      filter: drop-shadow(0 0 8px rgba(255,215,0,0.2));
    }

    .footer-logo-fallback {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: 1.35rem;
      color: var(--white);
      letter-spacing: 0.12em;
      text-shadow: 0 0 10px rgba(255,215,0,0.25);
      margin-bottom: 1.5rem;
      display: block;
    }

    .footer-links {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 0.5rem 2rem;
      margin-bottom: 1.75rem;
    }

    .footer-links a {
      font-family: 'Rajdhani', sans-serif;
      font-weight: 600;
      font-size: 0.88rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--grey);
      text-decoration: none;
      transition: color 0.2s;
    }

    .footer-links a:hover { color: var(--gold); }

    .footer-sep { color: #1e1e28; user-select: none; }

    .footer-copy {
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.76rem;
      letter-spacing: 0.1em;
      color: #2e2e3a;
      text-transform: uppercase;
    }

    /* ============================================
       SUBTLE SCAN LINE AMBIENCE
    ============================================ */
    body::after {
      content: '';
      position: fixed;
      top: -2px; left: 0;
      width: 100%;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(255,215,0,0.06), transparent);
      animation: scan 10s linear infinite;
      pointer-events: none;
      z-index: 9999;
    }

    @keyframes scan {
      0%   { top: -2px; }
      100% { top: 100vh; }
    }

    /* ============================================
       RESPONSIVE
    ============================================ */
    @media (max-width: 768px) {
      .nav-links { display: none; }

      #hero::before, #hero::after {
        width: 50px;
        height: 50px;
      }

      section { padding: 4rem 1.25rem; }

      .roster-grid {
        grid-template-columns: 1fr;
        max-width: 300px;
      }

      .tiktok-card {
        width: 100%;
        max-width: 320px;
        height: 520px;
      }
    }

    @media (max-width: 480px) {
      .hero-title    { font-size: 2.6rem; }
      .hero-subtitle { font-size: 0.88rem; letter-spacing: 0.15em; }
      .hero-logo-img { width: 82vw; }
    }
  </style>
</head>

<body>

  <!-- ============================================
       NAVIGATION
  ============================================ -->
  <nav>
    <a href="#hero" class="nav-logo">
      <!--
        Drop btw-logo.png in the same folder.
        If the file isn't found, the text fallback shows instead.
      -->
      <img
        src="btw-logo.png"
        alt="Team btw!"
        class="nav-logo-img"
        onerror="this.style.display='none'; document.getElementById('nav-fallback').style.display='block';"
      />
      <span id="nav-fallback" class="nav-logo-fallback" style="display:none;">btw!</span>
    </a>

    <ul class="nav-links">
      <li><a href="#roster">Roster</a></li>
      <li><a href="#feed">Feed</a></li>
      <li><a href="[discord.gg](https://discord.gg/GZcAkqgQvA)" target="_blank" rel="noopener">Discord</a></li>
    </ul>
  </nav>


  <!-- ============================================
       HERO
  ============================================ -->
  <section id="hero">

    <!--
      Drop btw-logo.png in the same folder as index.html.
      Hidden automatically if file is missing.
    -->
    <img
      src="btw-logo.png"
      alt="Team btw! Esports"
      class="hero-logo-img"
      onerror="this.style.display='none';"
    />

    <p class="hero-eyebrow">Fortnite Zero Build</p>
    <h1 class="hero-title">Team <span class="exclaim">btw!</span></h1>
    <p class="hero-subtitle">Zero Build. High Tier.</p>

    <a
      href="[discord.gg](https://discord.gg/GZcAkqgQvA)"
      target="_blank"
      rel="noopener"
      class="btn-primary"
    >
      Join the Discord
    </a>

  </section>


  <!-- ============================================
       ROSTER
       To add a member: copy the player-card block below,
       update the avatar, name, role, and both href values.
  ============================================ -->
  <section id="roster">
    <h2 class="section-title">Active Roster</h2>

    <div class="roster-grid">

      <!-- ── PLAYER CARD: JDogg ─────────────────
           TO USE THE DOG PHOTO:
           1. Save the dog image as "jdogg-logo.jpg"
              in the same folder as index.html.
           2. Delete the <div class="player-avatar">J</div> line.
           3. Uncomment the <img> line below it.
      ──────────────────────────────────────────-->
      <div class="player-card">

        <div class="player-avatar">J</div>
        <!-- Uncomment this line and delete the div above once you have the image file:
        <img src="jdogg-logo.jpg" alt="JDogg" class="player-avatar player-avatar--img" />
        -->

        <h3 class="player-name">JDogg</h3>
        <p class="player-role">Founder</p>

        <div class="card-divider"></div>

        <div class="card-buttons">
          <a
            href="[tiktok.com](https://www.tiktok.com/@tiktokjdogg)"
            target="_blank"
            rel="noopener"
            class="btn-secondary"
          >
            TikTok
          </a>
          <a
            href="[discord.gg](https://discord.gg/3fBhDtWkCx)"
            target="_blank"
            rel="noopener"
            class="btn-secondary"
          >
            Discord
          </a>
        </div>

      </div>
      <!-- ── END PLAYER CARD ─────────────────── -->

    </div>
  </section>


  <!-- ============================================
       FEED — Recent Drops
       When ready: delete .tiktok-placeholder-inner and
       paste a TikTok blockquote embed inside .tiktok-card.
  ============================================ -->
  <section id="feed">
    <h2 class="section-title">Recent Drops</h2>

    <div class="feed-grid">

      <div class="tiktok-card">
        <div class="tiktok-placeholder-inner">
          <svg viewBox="0 0 24 24" xmlns="[w3.org](http://www.w3.org/2000/svg)">
            <path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V8.69a8.18 8.18 0 0 0 4.78 1.52V6.75a4.85 4.85 0 0 1-1.01-.06z"/>
          </svg>
          <span>Drop coming soon</span>
        </div>
      </div>

      <div class="tiktok-card">
        <div class="tiktok-placeholder-inner">
          <svg viewBox="0 0 24 24" xmlns="[w3.org](http://www.w3.org/2000/svg)">
            <path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V8.69a8.18 8.18 0 0 0 4.78 1.52V6.75a4.85 4.85 0 0 1-1.01-.06z"/>
          </svg>
          <span>Drop coming soon</span>
        </div>
      </div>

      <div class="tiktok-card">
        <div class="tiktok-placeholder-inner">
          <svg viewBox="0 0 24 24" xmlns="[w3.org](http://www.w3.org/2000/svg)">
            <path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V8.69a8.18 8.18 0 0 0 4.78 1.52V6.75a4.85 4.85 0 0 1-1.01-.06z"/>
          </svg>
          <span>Drop coming soon</span>
        </div>
      </div>

    </div>
  </section>


  <!-- ============================================
       FOOTER
  ============================================ -->
  <footer>

    <img
      src="btw-logo.png"
      alt="Team btw!"
      class="footer-logo-img"
      onerror="this.style.display='none'; document.getElementById('footer-fallback').style.display='block';"
    />
    <span id="footer-fallback" class="footer-logo-fallback" style="display:none;">Team btw!</span>

    <div class="footer-links">
      <a href="mailto:contact@teambtw.gg">contact@teambtw.gg</a>
      <span class="footer-sep">·</span>
      <a href="[discord.gg](https://discord.gg/GZcAkqgQvA)" target="_blank" rel="noopener">Team Discord</a>
      <span class="footer-sep">·</span>
      <a href="[tiktok.com](https://www.tiktok.com/@tiktokjdogg)" target="_blank" rel="noopener">TikTok</a>
    </div>

    <p class="footer-copy">Team btw! &copy; 2026</p>

  </footer>

</body>
</html>
