<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Team btw!</title>

  <!-- Google Fonts: Orbitron (futuristic headers) + Rajdhani (body) -->
  <link rel="preconnect" href="[fonts.googleapis.com](https://fonts.googleapis.com)" />
  <link rel="preconnect" href="[fonts.gstatic.com](https://fonts.gstatic.com)" crossorigin />
  <link
    href="[fonts.googleapis.com](https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap)"
    rel="stylesheet"
  />

  <style>
    /* ============================================
       RESET & BASE
    ============================================ */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg:           #060608;
      --bg-card:      #0d0d10;
      --bg-section:   #0a0a0d;
      --accent-gold:  #FFB800;
      --accent-gold-dim: #a37700;
      --accent-blue:  #00AAFF;
      --accent-blue-dim: #005f8f;
      --text-white:   #FFFFFF;
      --text-grey:    #B0B0B0;
      --border-dim:   #1a1a20;
      --border-gold:  rgba(255, 184, 0, 0.4);
      --border-blue:  rgba(0, 170, 255, 0.4);
    }

    html { scroll-behavior: smooth; }

    body {
      background-color: var(--bg);
      color: var(--text-white);
      font-family: 'Rajdhani', sans-serif;
      font-size: 16px;
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ============================================
       UTILITY
    ============================================ */
    section { padding: 6rem 2rem; }

    .section-title {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: clamp(1.6rem, 4vw, 2.6rem);
      color: var(--text-white);
      text-align: center;
      margin-bottom: 3rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-shadow:
        0 0 15px rgba(255, 184, 0, 0.35),
        0 0 40px rgba(255, 184, 0, 0.1);
    }

    /* Gold underline accent on section titles */
    .section-title::after {
      content: '';
      display: block;
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, var(--accent-blue), var(--accent-gold));
      margin: 0.75rem auto 0;
      border-radius: 2px;
    }

    /* ============================================
       BUTTONS
    ============================================ */

    /* Primary: gold glow */
    .btn-primary {
      display: inline-block;
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: 0.8rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--accent-gold);
      padding: 0.85rem 2.5rem;
      border: 2px solid var(--accent-gold);
      border-radius: 3px;
      background: transparent;
      cursor: pointer;
      position: relative;
      transition: background 0.25s, color 0.25s, box-shadow 0.25s;
      box-shadow:
        0 0 12px rgba(255, 184, 0, 0.2),
        inset 0 0 12px rgba(255, 184, 0, 0.04);
    }

    .btn-primary:hover {
      background: var(--accent-gold);
      color: var(--bg);
      box-shadow:
        0 0 25px rgba(255, 184, 0, 0.55),
        0 0 60px rgba(255, 184, 0, 0.2);
    }

    /* Secondary: used on player cards */
    .btn-secondary {
      display: inline-block;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700;
      font-size: 0.82rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--text-grey);
      padding: 0.45rem 1.2rem;
      border: 1px solid #2a2a32;
      border-radius: 3px;
      background: transparent;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s, box-shadow 0.2s;
    }

    .btn-secondary:hover {
      color: var(--accent-gold);
      border-color: var(--accent-gold);
      box-shadow: 0 0 10px rgba(255, 184, 0, 0.25);
    }

    /* ============================================
       NAVIGATION
    ============================================ */
    nav {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.9rem 2.5rem;
      background: rgba(6, 6, 8, 0.9);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border-dim);
    }

    /* Nav logo uses the btw! banner image — falls back to text */
    .nav-logo {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      text-decoration: none;
    }

    .nav-logo-img {
      height: 38px;
      width: auto;
      object-fit: contain;
      /* 
        TO USE YOUR BTW LOGO IMAGE:
        Place your logo file (e.g. btw-logo.png) in the same folder as index.html
        and update the src below. The image is already referenced — just drop the file in.
      */
    }

    .nav-logo-text {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: 1.1rem;
      color: var(--accent-gold);
      letter-spacing: 0.08em;
      text-shadow: 0 0 12px rgba(255, 184, 0, 0.5);
    }

    .nav-links {
      display: flex;
      gap: 2.5rem;
      list-style: none;
    }

    .nav-links a {
      font-family: 'Rajdhani', sans-serif;
      font-weight: 600;
      font-size: 0.85rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-grey);
      text-decoration: none;
      transition: color 0.2s;
    }

    .nav-links a:hover { color: var(--accent-gold); }

    /* ============================================
       HERO SECTION
    ============================================ */
    #hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 0 2rem;
      position: relative;
      /* Dual glow — gold center, blue outer */
      background:
        radial-gradient(ellipse 60% 45% at 50% 52%, rgba(255, 184, 0, 0.05) 0%, transparent 65%),
        radial-gradient(ellipse 90% 70% at 50% 50%, rgba(0, 170, 255, 0.03) 0%, transparent 80%),
        var(--bg);
    }

    /* Corner bracket decorations */
    #hero::before, #hero::after {
      content: '';
      position: absolute;
      width: 100px;
      height: 100px;
      border-style: solid;
      border-color: var(--accent-gold);
      opacity: 0.2;
    }
    #hero::before { top: 10%; left: 5%; border-width: 2px 0 0 2px; }
    #hero::after  { bottom: 10%; right: 5%; border-width: 0 2px 2px 0; }

    /* 
      HERO LOGO IMAGE
      The btw! esports logo image sits above the title.
      Drop btw-logo.png into the same folder and it renders automatically.
    */
    .hero-logo-img {
      width: clamp(200px, 40vw, 480px);
      height: auto;
      object-fit: contain;
      margin-bottom: 1.5rem;
      filter: drop-shadow(0 0 30px rgba(255, 184, 0, 0.3));
    }

    .hero-eyebrow {
      font-family: 'Rajdhani', sans-serif;
      font-weight: 600;
      font-size: 0.8rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--accent-blue);
      margin-bottom: 1rem;
      opacity: 0.85;
    }

    .hero-title {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: clamp(3rem, 10vw, 7.5rem);
      line-height: 1;
      color: var(--text-white);
      letter-spacing: 0.04em;
      text-shadow:
        0 0 25px rgba(255, 184, 0, 0.55),
        0 0 70px rgba(255, 184, 0, 0.2),
        0 0 120px rgba(255, 184, 0, 0.08);
      margin-bottom: 0.5rem;
    }

    /* "btw!" exclamation mark in gold */
    .hero-title .exclaim { color: var(--accent-gold); }

    .hero-subtitle {
      font-family: 'Rajdhani', sans-serif;
      font-weight: 500;
      font-size: clamp(1rem, 2.5vw, 1.4rem);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--text-grey);
      margin-bottom: 3rem;
    }

    /* ============================================
       ROSTER SECTION
       To add a player: copy one .player-card block,
       update avatar/name/role/links.
    ============================================ */
    #roster {
      background: linear-gradient(180deg, var(--bg) 0%, var(--bg-section) 100%);
    }

    .roster-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1.75rem;
      max-width: 1100px;
      margin: 0 auto;
    }

    /* ── PLAYER CARD ─────────────────────────────
       Duplicate this entire .player-card block for each new member.
    ─────────────────────────────────────────────── */
    .player-card {
      background: var(--bg-card);
      border: 1px solid var(--border-dim);
      border-radius: 8px;
      padding: 2rem 1.5rem 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      text-align: center;
      position: relative;
      overflow: hidden;
      transition: border-color 0.3s, box-shadow 0.3s, transform 0.3s;
    }

    /* Gold top accent bar on hover */
    .player-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent-gold), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .player-card:hover {
      border-color: var(--accent-gold);
      box-shadow:
        0 0 25px rgba(255, 184, 0, 0.15),
        0 0 60px rgba(255, 184, 0, 0.05);
      transform: translateY(-5px);
    }

    .player-card:hover::before { opacity: 1; }

    /* 
      PLAYER AVATAR
      For JDogg: replace the <div class="player-avatar"> with:
        <img src="jdogg-logo.jpg" alt="JDogg" class="player-avatar player-avatar--img" />
      Save the dog photo as jdogg-logo.jpg in the same folder.
      The .player-avatar--img class handles the circular crop automatically.
    */
    .player-avatar {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: linear-gradient(135deg, #0d0d10 0%, #1a1a22 100%);
      border: 2px solid #2a2a35;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: 1.6rem;
      color: var(--accent-gold);
      margin-bottom: 0.5rem;
      transition: border-color 0.3s, box-shadow 0.3s;
      overflow: hidden; /* ensures image stays circular */
    }

    /* Used when swapping in a real photo */
    .player-avatar--img {
      object-fit: cover;
      font-size: 0; /* hides fallback text if img loads */
    }

    .player-card:hover .player-avatar {
      border-color: var(--accent-gold);
      box-shadow: 0 0 15px rgba(255, 184, 0, 0.3);
    }

    .player-name {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: 1.3rem;
      color: var(--text-white);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .player-role {
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700;
      font-size: 0.78rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--accent-gold);
      margin-bottom: 0.5rem;
    }

    .card-divider {
      width: 36px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #2a2a35, transparent);
      margin: 0.25rem 0 1rem;
    }

    .card-buttons {
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    /* ── END PLAYER CARD ──────────────────────── */

    /* ============================================
       THE FEED SECTION
       Replace .tiktok-placeholder-inner with real
       TikTok <blockquote class="tiktok-embed"> + script.
    ============================================ */
    #feed { background: var(--bg); }

    .feed-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1.5rem;
      max-width: 1100px;
      margin: 0 auto;
    }

    .tiktok-card {
      flex: 0 0 auto;
      width: 320px;
      height: 568px; /* 9:16 ratio */
      background: var(--bg-card);
      border: 1px solid var(--border-dim);
      border-radius: 10px;
      overflow: hidden;
      position: relative;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    .tiktok-card:hover {
      border-color: rgba(255, 184, 0, 0.25);
      box-shadow: 0 0 25px rgba(255, 184, 0, 0.08);
    }

    /* Placeholder interior — remove when embedding real TikToks */
    .tiktok-placeholder-inner {
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      color: #252530;
    }

    .tiktok-placeholder-inner svg {
      width: 38px; height: 38px;
      fill: #252530;
    }

    .tiktok-placeholder-inner span {
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    /* ============================================
       FOOTER
    ============================================ */
    footer {
      background: #040406;
      border-top: 1px solid var(--border-dim);
      padding: 3.5rem 2rem;
      text-align: center;
    }

    /* Footer logo image — same btw-logo.png, smaller size */
    .footer-logo-img {
      height: 48px;
      width: auto;
      object-fit: contain;
      margin-bottom: 1.5rem;
      opacity: 0.85;
      display: block;
      margin-left: auto;
      margin-right: auto;
      filter: drop-shadow(0 0 8px rgba(255, 184, 0, 0.2));
    }

    /* Text fallback if image not loaded */
    .footer-logo-text {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: 1.4rem;
      color: var(--text-white);
      letter-spacing: 0.1em;
      text-shadow: 0 0 10px rgba(255, 184, 0, 0.25);
      margin-bottom: 1.5rem;
      display: none; /* shown via JS fallback if needed, or just delete and use image */
    }

    .footer-links {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 0.5rem 2rem;
      margin-bottom: 1.75rem;
    }

    .footer-links a {
      font-family: 'Rajdhani', sans-serif;
      font-weight: 600;
      font-size: 0.88rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-grey);
      text-decoration: none;
      transition: color 0.2s;
    }

    .footer-links a:hover { color: var(--accent-gold); }

    .footer-divider { color: #222230; user-select: none; }

    .footer-copy {
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.78rem;
      letter-spacing: 0.1em;
      color: #333340;
      text-transform: uppercase;
    }

    /* ============================================
       ANIMATED GOLD SCAN LINE — subtle ambience
    ============================================ */
    body::after {
      content: '';
      position: fixed;
      top: -100%;
      left: 0;
      width: 100%;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(255,184,0,0.08), transparent);
      animation: scanline 8s linear infinite;
      pointer-events: none;
      z-index: 9999;
    }

    @keyframes scanline {
      0%   { top: -2px; }
      100% { top: 100vh; }
    }

    /* ============================================
       RESPONSIVE — MOBILE
    ============================================ */
    @media (max-width: 768px) {
      .nav-links { display: none; }

      #hero::before, #hero::after {
        width: 55px;
        height: 55px;
      }

      section { padding: 4rem 1.25rem; }

      .tiktok-card {
        width: 100%;
        max-width: 320px;
        height: 520px;
      }

      .roster-grid {
        grid-template-columns: 1fr;
        max-width: 300px;
      }
    }

    @media (max-width: 480px) {
      .hero-title { font-size: 2.8rem; }
      .hero-subtitle { font-size: 0.9rem; letter-spacing: 0.15em; }
      .hero-logo-img { width: 85vw; }
    }
  </style>
</head>

       NAVIGATION
  ============================================ -->
