<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Team btw!</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Audiowide&family=Chakra+Petch:wght@400;600;700&display=swap"
    rel="stylesheet"
  />

  <style>

    /* ============================================
       RESET
    ============================================ */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* ============================================
       DESIGN TOKENS - Cyberpunk Neon Palette
    ============================================ */
    :root {
      --bg:         #050505;
      --bg-card:    #0a0a0f;
      --bg-alt:     #08080a;
      --blue:       #00d4ff;   /* Electric Blue */
      --blue-hover: #5ce1e6;   
      --pink:       #ff007f;   /* Neon Pink */
      --white:      #ffffff;
      --grey:       #8a8a99;
      --border:     #1a1a24;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--white);
      font-family: 'Chakra Petch', sans-serif;
      font-size: 16px;
      line-height: 1.6;
      overflow-x: hidden;
    }

    section { padding: 6rem 2rem; }

    /* ============================================
       SECTION TITLES
    ============================================ */
    .section-title {
      font-family: 'Audiowide', cursive;
      font-weight: 400;
      font-size: clamp(1.5rem, 4vw, 2.4rem);
      color: var(--white);
      text-align: center;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 3rem;
    }

    .section-title::after {
      content: '';
      display: block;
      width: 54px;
      height: 3px;
      background: linear-gradient(90deg, var(--blue), var(--pink));
      margin: 0.7rem auto 0;
      border-radius: 2px;
      box-shadow: 0 0 10px var(--pink);
    }

    /* ============================================
       BUTTONS
    ============================================ */

    /* Primary blue outline button */
    .btn-primary {
      display: inline-block;
      font-family: 'Audiowide', cursive;
      font-weight: 400;
      font-size: 0.85rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--blue);
      padding: 1rem 2.6rem;
      border: 2px solid var(--blue);
      border-radius: 4px;
      background: transparent;
      cursor: pointer;
      box-shadow: 0 0 10px rgba(0, 212, 255, 0.2);
      transition: all 0.3s ease;
    }

    .btn-primary:hover {
      background: var(--blue);
      color: #000;
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.6);
      transform: scale(1.05);
    }

    /* Secondary card button */
    .btn-secondary {
      display: inline-block;
      font-family: 'Chakra Petch', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--grey);
      padding: 0.45rem 1.2rem;
      border: 1px solid #232330;
      border-radius: 3px;
      background: transparent;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-secondary:hover {
      color: var(--pink);
      border-color: var(--pink);
      box-shadow: 0 0 10px rgba(255, 0, 127, 0.4);
    }

    /* ============================================
       NAV
    ============================================ */
    nav {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.85rem 2.5rem;
      background: rgba(5, 5, 5, 0.85);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
    }

    .nav-logo {
      display: flex;
      align-items: center;
      text-decoration: none;
    }

    .nav-logo-img {
      height: 36px;
      width: auto;
    }

    .nav-logo-text {
      font-family: 'Audiowide', cursive;
      font-size: 1.1rem;
      color: var(--blue);
      letter-spacing: 0.1em;
      text-shadow: 0 0 8px var(--blue);
    }

    .nav-links {
      display: flex;
      gap: 2.5rem;
      list-style: none;
